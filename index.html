<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#BA7517" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Flota" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Sistema de Flota</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { min-height: 100%; }
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f0;
        --color-background-tertiary: #eeeee8;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5a5a55;
        --color-text-tertiary: #9a9a94;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --color-border-primary: rgba(0,0,0,0.35);
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'Courier New', Courier, monospace;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1e1e1e;
          --color-background-secondary: #161616;
          --color-background-tertiary: #111111;
          --color-text-primary: #e8e8e2;
          --color-text-secondary: #a0a09a;
          --color-text-tertiary: #606060;
          --color-border-tertiary: rgba(255,255,255,0.10);
          --color-border-secondary: rgba(255,255,255,0.18);
          --color-border-primary: rgba(255,255,255,0.28);
        }
        body { background: #111111; }
      }

      input, select, textarea, button { font-family: inherit; }
      input[type="date"], input[type="password"], input[type="text"], input[type="number"] { color-scheme: light dark; }
      select { color-scheme: light dark; }

      /* Hide scrollbar but keep scroll */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register PWA service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
